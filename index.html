<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator by Alperen Isler</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <h1>Calculator by Alperen Isler</h1>
    <div class="container">
        <div class="screen">
            <p class="screen-text-small">10 - 2 =</p>
            <p class="screen-text-big">5</p>
        </div>
        <div class="row">
            <button class="button operator" id="paranthesis-open">(</button>
            <button class="button operator" id="paranthesis-close">)</button>
            <button class="button operator" id="percentage">%</button>
            <button class="button operator" id="delete">AC</button>
        </div>
        <div class="row">
            <button class="button" id="seven">7</button>
            <button class="button" id="eight">8</button>
            <button class="button" id="nine">9</button>
            <button class="button operator" id="divide">÷</button>
        </div>
        <div class="row">
            <button class="button" id="four">4</button>
            <button class="button" id="five">5</button>
            <button class="button" id="six">6</button>
            <button class="button operator" id="multiplicate">x</button>
        </div>
        <div class="row">
            <button class="button" id="one">1</button>
            <button class="button" id="two">2</button>
            <button class="button" id="three">3</button>
            <button class="button operator" id="minus">-</button>
        </div>
        <div class="row">
            <button class="button" id="zero">0</button>
            <button class="button" id="dot">.</button>
            <button class="button operator" id="equal">=</button>
            <button class="button operator" id="plus">+</button>
        </div>
        <footer>
            <p>© 2026 Alperen Isler. All rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
