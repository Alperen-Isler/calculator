<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator by Alperen Isler</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <h1>Calculator by Alperen Isler</h1>
    <div class="container">
        <div class="screen">
            <p class="screen-text-small">10 - 2 =</p>
            <p class="screen-text-big">5</p>
        </div>
        <div class="row">
            <button class="button operator">(</button>
            <button class="button operator">)</button>
            <button class="button operator">%</button>
            <button class="button operator">AC</button>
        </div>
        <div class="row">
            <button class="button">7</button>
            <button class="button">8</button>
            <button class="button">9</button>
            <button class="button operator">÷</button>
        </div>
        <div class="row">
            <button class="button">4</button>
            <button class="button">5</button>
            <button class="button">6</button>
            <button class="button operator">x</button>
        </div>
        <div class="row">
            <button class="button">1</button>
            <button class="button">2</button>
            <button class="button">3</button>
            <button class="button operator">-</button>
        </div>
        <div class="row">
            <button class="button">0</button>
            <button class="button">.</button>
            <button class="button operator">=</button>
            <button class="button operator">+</button>
        </div>
        <footer>
            <p>© 2026 Alperen Isler. All rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
